<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tara Rose Ladies Salon — Stylist View</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylist.css">

</head>
<body>

<header>
  <div class="logo">
    <img src="image-asset-removebg-preview.png" style="width:36px;height:36px;object-fit:contain">
    <div class="logo-text">
      <div class="logo-name">Tara Rose Ladies</div>
      <div class="logo-sub">Salon</div>
      <div class="logo-strip"></div>
      <div class="dash-label">Stylist Performance</div>
    </div>
  </div>
  <div class="header-right">
    <div id="viewedTimestamp" style="
  text-align:right;font-size:10px;color:var(--muted);
  line-height:1.5;white-space:nowrap;padding-right:12px;
  border-right:1px solid var(--border);margin-right:4px;
"></div>
    <div class="toggle-wrap" onclick="toggleTheme()">
      <span class="toggle-lbl" id="themeLbl">Light</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="nav-group">
      <div class="nav-title">NAVIGATION</div>
      <button class="nav-sub" onclick="window.location.href='index.html'">← Dashboard</button>
      <button class="nav-sub" onclick="window.location.href='upload.html'">Upload Data</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">FILTER BY TYPE</div>
      <button class="nav-sub active" id="filterAll" onclick="setTypeFilter('all',this)">All Staff</button>
      <button class="nav-sub" id="filterHair" onclick="setTypeFilter('hair',this)">Hair Stylists</button>
      <button class="nav-sub" id="filterBeauty" onclick="setTypeFilter('beauty',this)">Beauticians</button>
    </div>
    <div class="nav-group">
      <div class="nav-title">SORT BY</div>
      <button class="nav-sub active" id="sortSales" onclick="setSort('hairSalesNet',this)">Net Revenue</button>
      <button class="nav-sub" id="sortClients" onclick="setSort('total',this)">Total Clients</button>
      <button class="nav-sub" id="sortRebook" onclick="setSort('rebookPct',this)">Rebooking %</button>
      <button class="nav-sub" id="sortAvgBill" onclick="setSort('avgBill',this)">Avg Bill</button>
    </div>
  </aside>

  <div class="main-content-wrapper">
  <div class="controls">

      <div class="ctrl-group">
        <div class="ctrl-label">Staff</div>
        <input type="text" id="searchInput" placeholder="Type a name...">
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Branch</div>
        <select id="branchFilter" onchange="renderGrid()">
          <option value="all">All Branches</option>
          <option value="KCA">Khalifa City</option>
          <option value="SAA">Saadiyat</option>
          <option value="MC">Motor City</option>
          <option value="AQ">AQ Ladies</option>
          <!-- <option value="FRT">Fratelli</option> -->
        </select>
      </div>
    
      <div class="ctrl-group">
        <div class="ctrl-label">Date Range</div>
        <div class="ms-wrap" id="dateRangeWrap">
          <button class="ms-btn date-pill-btn" id="btn-daterange" onclick="event.stopPropagation();toggleDatePicker()">
            <span id="lbl-daterange">Select Date/s From and To</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" id="daterange-chevron"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="date-picker-pop" id="datePickerPop" onclick="event.stopPropagation()">
            <div class="cal-steps">
              <div class="cal-step" id="calStepFrom">
                <span class="cal-step-label">FROM</span>
                <span class="cal-step-val" id="calStepFromVal">Select start</span>
              </div>
              <div class="cal-step-arrow">→</div>
              <div class="cal-step" id="calStepTo">
                <span class="cal-step-label">TO</span>
                <span class="cal-step-val" id="calStepToVal">Select end</span>
              </div>
              <button class="date-picker-clear" onclick="clearDateRange()">Clear</button>
            </div>
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="shiftCal(-1)">‹</button>
              <div class="cal-nav-center">
                <select class="cal-sel" id="calMonthSel" onchange="calMonthChange()">
                  <option value="0">January</option><option value="1">February</option>
                  <option value="2">March</option><option value="3">April</option>
                  <option value="4">May</option><option value="5">June</option>
                  <option value="6">July</option><option value="7">August</option>
                  <option value="8">September</option><option value="9">October</option>
                  <option value="10">November</option><option value="11">December</option>
                </select>
                <select class="cal-sel" id="calYearSel" onchange="calYearChange()"></select>
              </div>
              <button class="cal-nav-btn" onclick="shiftCal(1)">›</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="date-picker-footer">
              <span class="date-picker-selection" id="date-picker-selection">Click a date to set FROM</span>
              <button class="date-picker-apply" onclick="applyDateRange()">Apply</button>
            </div>
          </div>
        </div>
      </div>
    
      <!-- FRATELLI TOGGLE -->
      <div class="ctrl-group" style="align-self:center;margin-left:4px">
        <div class="ctrl-label">Show</div>
        <button id="fratelliToggleBtn" onclick="toggleFratelli()" class="branch-pill frt" style="display:flex;align-items:center;gap:6px;border-radius:20px;padding:5px 12px;font-size:10px;font-family:inherit;cursor:pointer;letter-spacing:.04em;white-space:nowrap;transition:all .2s">
          <span id="fratelliToggleDot" style="width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:0.7"></span>
          Fratelli
        </button>
      </div>
    </div><!-- end controls -->
  <div class="main-content">

    <!-- LOADING -->
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <div>Loading stylist data…</div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" style="display:none">

      <!-- DETAIL PANEL (hidden until stylist selected) -->
      <div class="detail-panel" id="detailPanel" style="display:none"></div>

      <!-- HAIR STYLISTS GRID -->
      <div id="hairSection">
        <div class="section-title" id="hairSectionTitle">Hair Stylists</div>
        <div class="stylist-grid" id="hairGrid"></div>
      </div>

      <!-- BEAUTY GRID -->
      <div id="beautySection">
        <div class="section-title" id="beautySectionTitle">Beauticians</div>
        <div class="stylist-grid" id="beautyGrid"></div>
      </div>

      <div class="empty" id="emptyState" style="display:none">
        No results. Try adjusting date range or search.
      </div>
    </div>

   </div><!-- end main-content -->
  </div><!-- end main-content-wrapper -->
</div><!-- end layout -->

<script src="stylist.js" defer></script>
</body>
</html>
